<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계산기</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
      text-align: right;
    }

    .display .expression {
      color: #a0aec0;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .result {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      padding: 18px 0;
      transition: transform 0.1s, opacity 0.1s;
    }

    button:active {
      transform: scale(0.94);
      opacity: 0.85;
    }

    .btn-clear {
      background: #e53e3e;
      color: white;
    }

    .btn-sign, .btn-percent {
      background: #2d3748;
      color: #a0aec0;
    }

    .btn-op {
      background: #e8a020;
      color: white;
    }

    .btn-num {
      background: #2a3a5c;
      color: #e2e8f0;
    }

    .btn-zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 28px;
    }

    .btn-eq {
      background: #e8a020;
      color: white;
    }

    .btn-del {
      background: #2d3748;
      color: #fc8181;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-sign" onclick="toggleSign()">+/-</button>
      <button class="btn-percent" onclick="percent()">%</button>
      <button class="btn-op" onclick="setOp('/')">÷</button>

      <button class="btn-num" onclick="input('7')">7</button>
      <button class="btn-num" onclick="input('8')">8</button>
      <button class="btn-num" onclick="input('9')">9</button>
      <button class="btn-op" onclick="setOp('*')">×</button>

      <button class="btn-num" onclick="input('4')">4</button>
      <button class="btn-num" onclick="input('5')">5</button>
      <button class="btn-num" onclick="input('6')">6</button>
      <button class="btn-op" onclick="setOp('-')">−</button>

      <button class="btn-num" onclick="input('1')">1</button>
      <button class="btn-num" onclick="input('2')">2</button>
      <button class="btn-num" onclick="input('3')">3</button>
      <button class="btn-op" onclick="setOp('+')">+</button>

      <button class="btn-num btn-zero" onclick="input('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-eq" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = '';
    let operator = null;
    let shouldReset = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = current;
    }

    function input(digit) {
      if (shouldReset) {
        current = digit;
        shouldReset = false;
      } else {
        current = current === '0' ? digit : current + digit;
      }
      if (current.length > 12) current = current.slice(0, 12);
      updateDisplay();
    }

    function inputDot() {
      if (shouldReset) { current = '0'; shouldReset = false; }
      if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    function setOp(op) {
      if (operator && !shouldReset) calculate(true);
      previous = current;
      operator = op;
      shouldReset = true;
      const opSymbol = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
      expressionEl.textContent = `${previous} ${opSymbol}`;
    }

    function calculate(chaining = false) {
      if (!operator || !previous) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      let res;
      switch (operator) {
        case '+': res = a + b; break;
        case '-': res = a - b; break;
        case '*': res = a * b; break;
        case '/': res = b === 0 ? 'Error' : a / b; break;
      }
      const opSymbol = { '+': '+', '-': '−', '*': '×', '/': '÷' }[operator];
      if (!chaining) expressionEl.textContent = `${previous} ${opSymbol} ${current} =`;
      current = res === 'Error' ? 'Error' : String(parseFloat(res.toFixed(10)));
      operator = null;
      previous = '';
      shouldReset = true;
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      previous = '';
      operator = null;
      shouldReset = false;
      expressionEl.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      if (current === '0' || current === 'Error') return;
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
      updateDisplay();
    }

    function percent() {
      if (current === 'Error') return;
      current = String(parseFloat(current) / 100);
      updateDisplay();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') input(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') setOp('+');
      else if (e.key === '-') setOp('-');
      else if (e.key === '*') setOp('*');
      else if (e.key === '/') { e.preventDefault(); setOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1 && current !== 'Error') current = current.slice(0, -1);
        else current = '0';
        updateDisplay();
      }
    });
  </script>
</body>
</html>
